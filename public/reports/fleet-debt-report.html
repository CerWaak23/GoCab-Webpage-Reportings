<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Flota GoCab</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

.container{max-width:1400px;margin:0 auto;padding:24px 20px}
.section{margin-bottom:28px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:14px}
.card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:20px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}}
.kpi-card{border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.kpi-debt{background:#150505;border:1px solid #7f1d1d33}
.kpi-recovered{background:#05150d;border:1px solid #064e3b33}
.kpi-drivers{background:#050b1a;border:1px solid #1e3a5f33}
.kpi-total{background:#130d02;border:1px solid #78350f33}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#6b7280}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:#4b5563}
.kpi-debt .kpi-value{color:#f87171}
.kpi-recovered .kpi-value{color:#34d399}
.kpi-drivers .kpi-value{color:#60a5fa}
.kpi-total .kpi-value{color:#fbbf24}

.charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
@media(max-width:800px){.charts-grid{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:260px;width:100%}

.filter-chip{display:inline-flex;align-items:center;gap:6px;background:#1e3a5f;border:1px solid #2563eb44;color:#93c5fd;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;margin-bottom:12px}
.filter-chip button{background:none;border:none;color:#93c5fd;cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
.filter-chip button:hover{color:#fff}

.filters-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.filter-select,.filter-input{background:#111827;border:1px solid #374151;color:#e2e8f0;border-radius:8px;padding:7px 11px;font-size:12px;outline:none;transition:border-color .15s}
.filter-select:focus,.filter-input:focus{border-color:#3b82f6}
.filter-input{flex:1;min-width:160px;max-width:260px}
.filter-clear{background:none;border:1px solid #374151;color:#9ca3af;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;transition:all .15s}
.filter-clear:hover{border-color:#6b7280;color:#e2e8f0}

.drivers-scroll{overflow-x:auto}
.drivers-table{border-collapse:collapse;width:100%;font-size:12px;min-width:700px}
.drivers-table th{background:#1a2030;color:#9ca3af;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:9px 12px;text-align:left;border-bottom:1px solid #374151;white-space:nowrap;cursor:pointer;user-select:none}
.drivers-table th:hover{color:#e2e8f0}
.drivers-table th.sort-asc::after{content:' ↑';color:#60a5fa}
.drivers-table th.sort-desc::after{content:' ↓';color:#60a5fa}
.drivers-table td{padding:9px 12px;border-bottom:1px solid #1a2030;color:#d1d5db}
.drivers-table tr:hover td{background:#0f1623}
.drivers-table td.amount{text-align:right;font-weight:600}
.drivers-table td.debt{color:#f87171}
.drivers-table td.paid{color:#34d399}
.drivers-table td.total-amt{color:#9ca3af}
.status-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.s-completed{background:#064e3b33;color:#34d399}
.s-pending{background:#78350f33;color:#fbbf24}
.s-partial{background:#1e3a5f33;color:#60a5fa}

.bar-mini{height:4px;border-radius:2px;background:#1f2937;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:#34d399;transition:width .3s}

.pagination{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:flex-end}
.page-btn{background:#111827;border:1px solid #374151;color:#9ca3af;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:#4b5563;color:#e2e8f0}
.page-btn:disabled{opacity:.3;cursor:default}
.page-info{font-size:12px;color:#6b7280}

.loading-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#6b7280}
.spinner{width:36px;height:36px;border:3px solid #1f2937;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:40px}
.error-title{font-size:17px;font-weight:700;color:#f87171}
.error-msg{color:#9ca3af;max-width:500px;line-height:1.6;font-size:13px}
.error-hint{background:#111827;border:1px solid #374151;border-radius:10px;padding:14px 18px;font-family:monospace;font-size:11px;color:#fbbf24;text-align:left;max-width:500px;white-space:pre-wrap}

.type-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.dot-energy{background:#60a5fa}
.dot-toll{background:#34d399}
.dot-repair{background:#fbbf24}
.dot-admin{background:#f87171}
.dot-other{background:#9ca3af}
</style>
</head>
<body>

<div id="loadingWrap" class="loading-wrap">
  <div class="spinner"></div>
  <span>Cargando datos...</span>
</div>

<div id="errorWrap" class="error-wrap" style="display:none">
  <div style="font-size:36px">⚠️</div>
  <div class="error-title" id="errTitle">Error al cargar datos</div>
  <div class="error-msg" id="errMsg"></div>
  <div class="error-hint" id="errHint" style="display:none"></div>
</div>

<div id="mainWrap" style="display:none">
<div class="container">

  <!-- KPIs -->
  <div class="section">
    <div class="kpi-grid">
      <div class="kpi-card kpi-debt">
        <div class="kpi-label" data-i18n="total_debt">Deuda Total</div>
        <div class="kpi-value" id="kpiDebt">—</div>
        <div class="kpi-sub" id="kpiDebtSub">—</div>
      </div>
      <div class="kpi-card kpi-recovered">
        <div class="kpi-label" data-i18n="recovered">% Recuperado</div>
        <div class="kpi-value" id="kpiRecovered">—</div>
        <div class="kpi-sub" id="kpiRecoveredAmt">—</div>
      </div>
      <div class="kpi-card kpi-drivers">
        <div class="kpi-label" data-i18n="drivers_debt">Conductores con Deuda</div>
        <div class="kpi-value" id="kpiDrivers">—</div>
        <div class="kpi-sub" id="kpiDriversSub">—</div>
      </div>
      <div class="kpi-card kpi-total">
        <div class="kpi-label" data-i18n="total_bills">Total Facturas</div>
        <div class="kpi-value" id="kpiBills">—</div>
        <div class="kpi-sub" id="kpiBillsSub">—</div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="section">
    <div class="charts-grid">
      <div class="card">
        <div class="section-title" data-i18n="monthly_evolution">Evolución Mensual</div>
        <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title" data-i18n="debt_by_type">Deuda por Tipo <span style="font-size:10px;color:#4b5563;font-weight:400;text-transform:none;letter-spacing:0">(click para filtrar)</span></div>
        <div id="typeFilterChip" class="filter-chip" style="display:none"></div>
        <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Drivers table -->
  <div class="section card">
    <div class="section-title" data-i18n="drivers_table">Conductores</div>
    <div class="filters-bar">
      <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">Todos los tipos</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="">Todos los estados</option>
      </select>
      <input class="filter-input" id="filterText" type="text" placeholder="Buscar conductor..." oninput="applyFilters()">
      <button class="filter-clear" onclick="clearAllFilters()">Limpiar todo</button>
    </div>

    <div class="drivers-scroll">
      <table class="drivers-table">
        <thead>
          <tr>
            <th onclick="sortBy('driver')" data-i18n="driver">Conductor</th>
            <th onclick="sortBy('vehicle')" data-i18n="vehicle">Vehículo</th>
            <th onclick="sortBy('bills')" data-i18n="bills">Facturas</th>
            <th onclick="sortBy('amount')" data-i18n="total_amount">Total</th>
            <th onclick="sortBy('paid')" data-i18n="paid">Pagado</th>
            <th onclick="sortBy('pending')" data-i18n="pending_debt">Deuda Pendiente</th>
            <th data-i18n="recovery">Recuperación</th>
            <th data-i18n="main_type">Tipo Principal</th>
          </tr>
        </thead>
        <tbody id="driversBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <span class="page-info" id="pageInfo"></span>
      <button class="page-btn" id="btnPrev" onclick="changePage(-1)" data-i18n="previous">Anterior</button>
      <button class="page-btn" id="btnNext" onclick="changePage(1)" data-i18n="next">Siguiente</button>
    </div>
  </div>

</div>
</div>

<script>
var USD_RATE = 950;
var PAGE_SIZE = 50;

var BILLS = [];        // raw bill objects from API
var DRIVERS = [];      // aggregated per-driver
var FILTERED = [];     // filtered driver list
var LANG = 'es';
var CUR  = 'CLP';
var _typeFilter = null;
var _page = 1;
var _sortKey = 'pending';
var _sortDir = -1;
var _lineChart = null;
var _donutChart = null;

// Bill types mapping
var TYPE_MAP = {
  energy:['energy','energía','energia'],
  toll:['toll','peaje'],
  reparation:['reparation','reparación','reparacion','repair'],
  administrative:['administrative','administrativo','admin']
};
var TYPE_LABELS = {es:{energy:'Energía',toll:'Peaje',reparation:'Reparación',administrative:'Administrativo',other:'Otro'},
                   en:{energy:'Energy',toll:'Toll',reparation:'Repair',administrative:'Administrative',other:'Other'},
                   ru:{energy:'Энергия',toll:'Пошлина',reparation:'Ремонт',administrative:'Административные',other:'Прочее'}};
var TYPE_COLORS = {energy:'#60a5fa',toll:'#34d399',reparation:'#fbbf24',administrative:'#f87171',other:'#9ca3af'};
var TYPE_DOT   = {energy:'dot-energy',toll:'dot-toll',reparation:'dot-repair',administrative:'dot-admin',other:'dot-other'};

var T = {
  es:{loading:'Cargando datos...',total_debt:'Deuda Total',recovered:'% Recuperado',drivers_debt:'Conductores con Deuda',
      total_bills:'Total Facturas',monthly_evolution:'Evolución Mensual',debt_by_type:'Deuda por Tipo',
      drivers_table:'Conductores',driver:'Conductor',vehicle:'Vehículo',bills:'Facturas',total_amount:'Total',
      paid:'Pagado',pending_debt:'Deuda Pendiente',recovery:'Recuperación',main_type:'Tipo Principal',
      all_types:'Todos los tipos',all_statuses:'Todos los estados',search:'Buscar conductor...',
      clear_all:'Limpiar todo',previous:'Anterior',next:'Siguiente',of:'de',results:'resultados',
      no_results:'Sin resultados',error_title:'Error al cargar datos',clear_filter:'Limpiar filtro',
      bills_label:'facturas',amount_label:'monto total',pending_label:'pendiente'},
  en:{loading:'Loading data...',total_debt:'Total Debt',recovered:'% Recovered',drivers_debt:'Drivers with Debt',
      total_bills:'Total Bills',monthly_evolution:'Monthly Evolution',debt_by_type:'Debt by Type',
      drivers_table:'Drivers',driver:'Driver',vehicle:'Vehicle',bills:'Bills',total_amount:'Total',
      paid:'Paid',pending_debt:'Pending Debt',recovery:'Recovery',main_type:'Main Type',
      all_types:'All types',all_statuses:'All statuses',search:'Search driver...',
      clear_all:'Clear all',previous:'Previous',next:'Next',of:'of',results:'results',
      no_results:'No results',error_title:'Error loading data',clear_filter:'Clear filter',
      bills_label:'bills',amount_label:'total amount',pending_label:'pending'},
  ru:{loading:'Загрузка данных...',total_debt:'Общий долг',recovered:'% Погашено',drivers_debt:'Водители с долгом',
      total_bills:'Всего счетов',monthly_evolution:'Месячная динамика',debt_by_type:'Долг по типу',
      drivers_table:'Водители',driver:'Водитель',vehicle:'Транспорт',bills:'Счета',total_amount:'Итого',
      paid:'Оплачено',pending_debt:'Задолженность',recovery:'Погашение',main_type:'Тип',
      all_types:'Все типы',all_statuses:'Все статусы',search:'Поиск водителя...',
      clear_all:'Очистить всё',previous:'Назад',next:'Вперёд',of:'из',results:'результатов',
      no_results:'Нет результатов',error_title:'Ошибка загрузки',clear_filter:'Очистить фильтр',
      bills_label:'счетов',amount_label:'общая сумма',pending_label:'задолженность'}
};

function t(k){return (T[LANG]||T.es)[k]||k;}
function typeLabel(tp){return (TYPE_LABELS[LANG]||TYPE_LABELS.es)[tp]||tp;}

function fmtAmt(v){
  var n=CUR==='USD'?v/USD_RATE:v;
  if(CUR==='USD')return 'US$ '+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '$ '+Math.round(n).toLocaleString('es-CL');
}
function fmtShort(v){
  var n=CUR==='USD'?v/USD_RATE:v;
  var pfx=CUR==='USD'?'US$ ':'$ ';
  if(Math.abs(n)>=1e9)return pfx+(n/1e9).toFixed(1)+'B';
  if(Math.abs(n)>=1e6)return pfx+(n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3)return pfx+(n/1e3).toFixed(0)+'K';
  return fmtAmt(v);
}

function parseAmt(v){
  if(!v&&v!==0)return 0;
  var n=parseFloat(String(v).replace(/[^\d.-]/g,''));
  return isNaN(n)?0:n;
}

function classifyType(typeStr){
  var tl=(typeStr||'').toLowerCase();
  for(var k in TYPE_MAP){
    for(var i=0;i<TYPE_MAP[k].length;i++){
      if(tl.indexOf(TYPE_MAP[k][i])!==-1)return k;
    }
  }
  return 'other';
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function loadData(){
  show('loadingWrap');
  try{
    var res=await fetch('/api/bills');
    var json=await res.json();
    if(json.error){showError(json.error);return;}
    BILLS=json.bills||[];
    aggregateDrivers();
    buildFilters();
    renderAll();
    show('mainWrap');
  }catch(err){showError(err.message);}
}

function show(id){
  ['loadingWrap','errorWrap','mainWrap'].forEach(function(i){
    document.getElementById(i).style.display=i===id?'':'none';
  });
}

function showError(msg){
  show('errorWrap');
  document.getElementById('errTitle').textContent=t('error_title');
  document.getElementById('errMsg').textContent=msg;
  var isCreds=msg.includes('credentials')||msg.includes('GOOGLE_')||msg.includes('Missing');
  if(isCreds){
    var h=document.getElementById('errHint');h.style.display='';
    h.textContent='GOOGLE_CLIENT_EMAIL=service@project.iam.gserviceaccount.com\nGOOGLE_PRIVATE_KEY="-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n"';
  }
}

// ─── Aggregation ──────────────────────────────────────────────────────────────
function aggregateDrivers(){
  var map={};
  BILLS.forEach(function(b){
    var key=b.driver||'(sin conductor)';
    if(!map[key]){
      map[key]={driver:key,vehicle:b.vehicle||'',bills:0,amount:0,paid:0,types:{},statuses:{},dates:[]};
    }
    var d=map[key];
    d.bills++;
    d.amount+=parseAmt(b.amount);
    d.paid+=parseAmt(b.paidAmount);
    var tp=classifyType(b.type);
    d.types[tp]=(d.types[tp]||0)+parseAmt(b.amount);
    var st=(b.status||'').toLowerCase();
    d.statuses[st]=(d.statuses[st]||0)+1;
    if(b.createdAt)d.dates.push(b.createdAt);
    // keep most recent vehicle
    if(b.vehicle)d.vehicle=b.vehicle;
  });
  DRIVERS=Object.values(map).map(function(d){
    d.pending=Math.max(0,d.amount-d.paid);
    d.pct=d.amount>0?Math.round(d.paid/d.amount*100):0;
    // main type
    var mainType='other';var maxV=0;
    Object.keys(d.types).forEach(function(k){if(d.types[k]>maxV){maxV=d.types[k];mainType=k;}});
    d.mainType=mainType;
    return d;
  });
}

// ─── Filters ─────────────────────────────────────────────────────────────────
function buildFilters(){
  var types=[],statuses=[];
  BILLS.forEach(function(b){
    var tp=classifyType(b.type);
    if(types.indexOf(tp)<0)types.push(tp);
    if(b.status&&statuses.indexOf(b.status)<0)statuses.push(b.status);
  });
  fillSelect('filterType',types.map(function(tp){return {value:tp,label:typeLabel(tp)};}),t('all_types'));
  fillSelect('filterStatus',statuses.map(function(s){return {value:s,label:s};}),t('all_statuses'));
}

function fillSelect(id,opts,all){
  var sel=document.getElementById(id);if(!sel)return;
  var prev=sel.value;
  sel.innerHTML='<option value="">'+all+'</option>';
  opts.forEach(function(o){
    var op=document.createElement('option');op.value=o.value;op.textContent=o.label;sel.appendChild(op);
  });
  if(prev)sel.value=prev;
}

function getFiltered(){
  var ft=(document.getElementById('filterType')||{}).value||'';
  var fs=(document.getElementById('filterStatus')||{}).value||'';
  var ftext=((document.getElementById('filterText')||{}).value||'').toLowerCase();

  var matchingDrivers=null;

  // If type or status filter, first find matching bills → matching drivers
  if(ft||fs||_typeFilter){
    var driverSet={};
    BILLS.forEach(function(b){
      var tp=classifyType(b.type);
      var tpMatch=(!ft&&!_typeFilter)||(ft&&tp===ft)||(_typeFilter&&tp===_typeFilter);
      var stMatch=!fs||(b.status||'')=== fs;
      if(tpMatch&&stMatch)driverSet[b.driver||'(sin conductor)']=true;
    });
    matchingDrivers=driverSet;
  }

  return DRIVERS.filter(function(d){
    if(matchingDrivers&&!matchingDrivers[d.driver])return false;
    if(ftext&&d.driver.toLowerCase().indexOf(ftext)===-1&&d.vehicle.toLowerCase().indexOf(ftext)===-1)return false;
    return true;
  });
}

function applyFilters(){
  _page=1;
  FILTERED=sortDrivers(getFiltered());
  renderKPIs(FILTERED);
  renderDriversTable(FILTERED);
}

function clearAllFilters(){
  ['filterType','filterStatus'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  var ft=document.getElementById('filterText');if(ft)ft.value='';
  clearTypeFilter();
}

// ─── Type (donut) filter ──────────────────────────────────────────────────────
function clearTypeFilter(){
  _typeFilter=null;
  var c=document.getElementById('typeFilterChip');c.innerHTML='';c.style.display='none';
  _page=1;
  FILTERED=sortDrivers(getFiltered());
  renderKPIs(FILTERED);
  renderDriversTable(FILTERED);
}

function setTypeFilter(tp){
  if(_typeFilter===tp){clearTypeFilter();return;}
  _typeFilter=tp;
  var c=document.getElementById('typeFilterChip');
  c.innerHTML=typeLabel(tp)+' <button onclick="clearTypeFilter()" title="'+t('clear_filter')+'">×</button>';
  c.style.display='inline-flex';
  _page=1;
  FILTERED=sortDrivers(getFiltered());
  renderKPIs(FILTERED);
  renderDriversTable(FILTERED);
}

// ─── KPIs ─────────────────────────────────────────────────────────────────────
function renderKPIs(drv){
  drv=drv||DRIVERS;
  var totalAmt=0,totalPaid=0,withDebt=0;
  drv.forEach(function(d){totalAmt+=d.amount;totalPaid+=d.paid;if(d.pending>0)withDebt++;});
  var pct=totalAmt>0?Math.round(totalPaid/totalAmt*100):0;
  var pending=totalAmt-totalPaid;

  document.getElementById('kpiDebt').textContent=fmtAmt(pending);
  document.getElementById('kpiDebtSub').textContent=fmtAmt(totalAmt)+' total emitido';
  document.getElementById('kpiRecovered').textContent=pct+'%';
  document.getElementById('kpiRecoveredAmt').textContent=fmtAmt(totalPaid)+' recuperado';
  document.getElementById('kpiDrivers').textContent=withDebt;
  document.getElementById('kpiDriversSub').textContent=drv.length+' conductores en vista';
  document.getElementById('kpiBills').textContent=BILLS.length;
  document.getElementById('kpiBillsSub').textContent='en '+BILLS.filter(function(b){return (b.status||'').toLowerCase().indexOf('completed')!==-1||(b.status||'').toLowerCase().indexOf('completado')!==-1;}).length+' completadas';
}

// ─── Monthly chart + donut ────────────────────────────────────────────────────
var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function monthIdx(m){
  if(!m)return 99;var ml=m.toLowerCase();
  for(var i=0;i<MONTHS.length;i++)if(ml.indexOf(MONTHS[i])!==-1)return i;
  var d=new Date(m);if(!isNaN(d))return d.getMonth();
  return 99;
}

function renderCharts(){
  // Monthly evolution from bills createdAt
  var bm={};
  BILLS.forEach(function(b){
    if(!b.createdAt)return;
    // Try to parse month/year from createdAt (could be "YYYY-MM-DD" or "DD/MM/YYYY" or "Enero 2026")
    var m='';
    var d=new Date(b.createdAt);
    if(!isNaN(d)){
      var mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      m=mn[d.getMonth()]+' '+d.getFullYear();
    } else {
      // try DD/MM/YYYY
      var p=b.createdAt.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if(p){
        var mn2=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        var mo=parseInt(p[2])-1;
        var yr=p[3].length===2?'20'+p[3]:p[3];
        m=mn2[mo]+' '+yr;
      }
    }
    if(!m)return;
    if(!bm[m])bm[m]={amount:0,paid:0};
    bm[m].amount+=parseAmt(b.amount);
    bm[m].paid+=parseAmt(b.paidAmount);
  });

  var months=Object.keys(bm).sort(function(a,b){
    var ai=monthIdx(a),bi=monthIdx(b);if(ai!==bi)return ai-bi;
    var ya=parseInt((a.match(/\d{4}/)||[9999])[0]);
    var yb=parseInt((b.match(/\d{4}/)||[9999])[0]);
    return ya-yb;
  });
  var amtArr=months.map(function(m){return CUR==='USD'?bm[m].amount/USD_RATE:bm[m].amount;});
  var paidArr=months.map(function(m){return CUR==='USD'?bm[m].paid/USD_RATE:bm[m].paid;});

  if(_lineChart){
    _lineChart.data.labels=months;
    _lineChart.data.datasets[0].data=amtArr;
    _lineChart.data.datasets[1].data=paidArr;
    _lineChart.update();
  } else {
    _lineChart=new Chart(document.getElementById('lineChart'),{
      type:'line',
      data:{labels:months,datasets:[
        {label:'Monto Total',data:amtArr,borderColor:'#f87171',backgroundColor:'rgba(248,113,113,.1)',fill:true,tension:.4,pointRadius:4,pointHoverRadius:6},
        {label:'Pagado',data:paidArr,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.1)',fill:true,tension:.4,pointRadius:4,pointHoverRadius:6}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{labels:{color:'#9ca3af',font:{size:12}}},
          tooltip:{callbacks:{label:function(ctx){return ' '+ctx.dataset.label+': '+fmtAmt(CUR==='USD'?ctx.raw*USD_RATE:ctx.raw);}}}
        },
        scales:{
          x:{ticks:{color:'#6b7280',maxRotation:45,font:{size:11}},grid:{color:'#1a2030'}},
          y:{ticks:{color:'#6b7280',font:{size:11},callback:function(v){return fmtShort(CUR==='USD'?v*USD_RATE:v);}},grid:{color:'#1a2030'}}
        }
      }
    });
  }

  // Donut — debt by type (from all bills, not filtered)
  var typeKeys=['energy','toll','reparation','administrative','other'];
  var typeAmts={energy:0,toll:0,reparation:0,administrative:0,other:0};
  BILLS.forEach(function(b){
    var tp=classifyType(b.type);
    typeAmts[tp]=(typeAmts[tp]||0)+parseAmt(b.amount);
  });
  var donutLabels=typeKeys.map(function(k){return typeLabel(k);});
  var donutData=typeKeys.map(function(k){return CUR==='USD'?typeAmts[k]/USD_RATE:typeAmts[k];});
  var donutColors=typeKeys.map(function(k){return TYPE_COLORS[k];});

  if(_donutChart){
    _donutChart.data.labels=donutLabels;
    _donutChart.data.datasets[0].data=donutData;
    _donutChart.update();
  } else {
    _donutChart=new Chart(document.getElementById('donutChart'),{
      type:'doughnut',
      data:{labels:donutLabels,datasets:[{data:donutData,backgroundColor:donutColors,borderWidth:2,borderColor:'#111827',hoverOffset:6}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:'right',labels:{color:'#9ca3af',font:{size:12},padding:12,usePointStyle:true,pointStyleWidth:8}},
          tooltip:{callbacks:{label:function(ctx){
            var raw=CUR==='USD'?ctx.raw*USD_RATE:ctx.raw;
            return ' '+ctx.label+': '+fmtAmt(raw)+' ('+Math.round(ctx.parsed/donutData.reduce(function(a,b){return a+b;},0)*100)+'%)';
          }}}
        },
        onClick:function(evt,elements){
          if(elements.length>0){
            var idx=elements[0].index;
            setTypeFilter(typeKeys[idx]);
          }
        },
        onHover:function(evt,elements){
          evt.native.target.style.cursor=elements.length>0?'pointer':'default';
        }
      }
    });
  }
}

// ─── Sort ─────────────────────────────────────────────────────────────────────
function sortDrivers(arr){
  return arr.slice().sort(function(a,b){
    var av=a[_sortKey]||0,bv=b[_sortKey]||0;
    if(typeof av==='string')return _sortDir*(av.localeCompare(bv));
    return _sortDir*(av-bv);
  });
}

function sortBy(key){
  if(_sortKey===key)_sortDir*=-1; else {_sortKey=key;_sortDir=-1;}
  FILTERED=sortDrivers(FILTERED);
  renderDriversTable(FILTERED);
  // Update header classes
  document.querySelectorAll('.drivers-table th').forEach(function(th){
    th.classList.remove('sort-asc','sort-desc');
  });
  // Find the th with matching onclick
  document.querySelectorAll('.drivers-table th[onclick]').forEach(function(th){
    if(th.getAttribute('onclick')==='sortBy(\''+key+'\')')
      th.classList.add(_sortDir>0?'sort-asc':'sort-desc');
  });
}

// ─── Drivers table ────────────────────────────────────────────────────────────
function renderDriversTable(drv){
  var total=drv.length;
  var pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(_page>pages)_page=pages;
  var start=(_page-1)*PAGE_SIZE;
  var slice=drv.slice(start,start+PAGE_SIZE);
  var tbody=document.getElementById('driversBody');if(!tbody)return;

  if(!slice.length){
    tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#4b5563;padding:24px">'+t('no_results')+'</td></tr>';
  } else {
    var html='';
    slice.forEach(function(d){
      var pct=d.pct;
      var dot=TYPE_DOT[d.mainType]||'dot-other';
      html+='<tr>';
      html+='<td>'+esc(d.driver)+'</td>';
      html+='<td style="color:#6b7280">'+esc(d.vehicle)+'</td>';
      html+='<td style="color:#9ca3af;text-align:right">'+d.bills+'</td>';
      html+='<td class="amount total-amt">'+fmtAmt(d.amount)+'</td>';
      html+='<td class="amount paid">'+fmtAmt(d.paid)+'</td>';
      html+='<td class="amount debt">'+fmtAmt(d.pending)+'</td>';
      html+='<td style="min-width:80px"><div style="font-size:11px;color:#9ca3af;margin-bottom:3px">'+pct+'%</div><div class="bar-mini"><div class="bar-fill" style="width:'+pct+'%"></div></div></td>';
      html+='<td><span class="type-dot '+dot+'"></span><span style="color:#9ca3af;font-size:11px">'+typeLabel(d.mainType)+'</span></td>';
      html+='</tr>';
    });
    tbody.innerHTML=html;
  }

  var info='';
  if(pages>1)info=(start+1)+'-'+Math.min(start+PAGE_SIZE,total)+' '+t('of')+' '+total+' '+t('results');
  else info=total+' '+t('results');
  document.getElementById('pageInfo').textContent=info;
  document.getElementById('btnPrev').disabled=_page<=1;
  document.getElementById('btnNext').disabled=_page>=pages;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function changePage(d){_page+=d;renderDriversTable(FILTERED);}

// ─── i18n ─────────────────────────────────────────────────────────────────────
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');if(T[LANG]&&T[LANG][k])el.textContent=T[LANG][k];
  });
  var ft=document.getElementById('filterText');if(ft)ft.placeholder=t('search');
  buildFilters();
}

function renderAll(){
  FILTERED=sortDrivers(getFiltered());
  renderKPIs(FILTERED);
  renderCharts();
  renderDriversTable(FILTERED);
  applyI18n();
}

function setLanguage(lang){if(!T[lang])return;LANG=lang;renderAll();}
function setCurrency(cur){CUR=cur;renderAll();}

window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='setLanguage')setLanguage(e.data.lang);
  if(e.data.type==='setCurrency')setCurrency(e.data.currency);
});

window.addEventListener('load',function(){
  try{
    var pl=window.parent.localStorage&&window.parent.localStorage.getItem('gocab_lang');
    if(pl&&T[pl])LANG=pl;
    var pc=window.parent.localStorage&&window.parent.localStorage.getItem('gocab_currency');
    if(pc)CUR=pc;
  }catch(e){}
  loadData();
});
</script>
